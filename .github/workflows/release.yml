name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # softprops/action-gh-release needs this to create the release

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"

      - name: Build sidecar exe
        run: python scripts/build_sidecar.py

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri installer
        working-directory: desktop
        env:
          VITE_BUILD_COMMIT: ${{ github.sha }}
        run: npm run tauri:build

      - name: Determine version and prerelease flag
        id: meta
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF -replace "refs/tags/", ""
          # Prerelease if the version contains any standard prerelease marker.
          $prerelease = "false"
          foreach ($marker in @("alpha","beta","rc","dev")) {
            if ($version -match $marker) { $prerelease = "true" }
          }
          "version=$version" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "prerelease=$prerelease" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          Write-Output "version=$version prerelease=$prerelease"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
          fail_on_unmatched_files: true
