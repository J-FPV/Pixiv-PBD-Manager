name: Package

on:
  workflow_dispatch:

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"

      - name: Build sidecar exe
        run: python scripts/build_sidecar.py

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri installer
        working-directory: desktop
        run: npm run tauri:build

      - name: Build artifact name
        id: meta
        shell: pwsh
        run: |
          $package = Get-Content desktop/package.json -Raw | ConvertFrom-Json
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          "name=pixiv-pbd-manager-v$($package.version)-$shortSha-run$env:GITHUB_RUN_NUMBER" |
            Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8

      - name: Upload installers
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.meta.outputs.name }}
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 14
